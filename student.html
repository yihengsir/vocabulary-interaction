<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabMaster - 学生端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f8fafc; color: #4b5563; }
        .duo-btn { border-bottom-width: 4px; transition: all 0.1s; font-weight: 800; cursor: pointer; }
        .duo-btn:active { border-bottom-width: 0px; transform: translateY(4px); }
        .btn-green { background-color: #58cc02; border-color: #46a302; color: white; }
        .btn-blue { background-color: #1cb0f6; border-color: #1899d6; color: white; }
        .nav-item.active { color: #58cc02; background-color: #e5f9d6; border: 2px solid #b3eb87; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="auth-screen" class="fixed inset-0 bg-green-500 z-50 flex flex-col items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center shadow-xl">
            <div class="text-green-500 text-5xl mb-4"><i class="fas fa-user-graduate"></i></div>
            <h2 class="text-2xl font-extrabold mb-6 text-gray-800">加入课堂</h2>
            <input type="password" id="entry-pass" class="w-full bg-gray-100 border-2 border-transparent focus:border-green-300 p-3 rounded-xl mb-3 text-center outline-none" placeholder="访问密码">
            <input type="text" id="stu-name" class="w-full bg-gray-100 border-2 border-transparent focus:border-green-300 p-3 rounded-xl mb-3 text-center font-bold outline-none" placeholder="你的名字 (如: Hao Chen)">
            <input type="text" id="class-id" class="w-full bg-gray-100 border-2 border-transparent focus:border-green-300 p-3 rounded-xl mb-6 text-center font-bold outline-none" placeholder="班级连接码">
            <button onclick="connectClass()" class="duo-btn btn-green w-full py-3 rounded-xl text-lg" id="btn-connect">进入教室</button>
        </div>
    </div>

    <nav class="bg-white border-b-2 border-gray-200 px-4 py-3 z-10 flex justify-between items-center">
        <div class="font-extrabold text-xl flex items-center gap-2 text-gray-700" id="nav-title">My Words</div>
        <div class="flex gap-2">
            <button onclick="switchTab('words')" id="tab-words" class="nav-item active px-3 py-1 rounded-lg font-bold text-sm"><i class="fas fa-book"></i> 词表</button>
            <button onclick="switchTab('mistakes')" id="tab-mistakes" class="nav-item text-gray-400 px-3 py-1 rounded-lg font-bold text-sm"><i class="fas fa-book-dead"></i> 错题本</button>
        </div>
    </nav>

    <main class="flex-grow overflow-auto p-4 w-full max-w-md mx-auto relative">
        <div id="view-words" class="space-y-3">
            <div class="text-center text-gray-400 font-bold text-sm py-10" id="empty-state">
                <i class="fas fa-satellite-dish text-4xl mb-3 text-gray-300"></i><br>
                等待老师发送单词...
            </div>
            <div id="words-list" class="space-y-3"></div>
        </div>

        <div id="view-mistakes" class="hidden space-y-3">
            <div class="flex justify-between items-center mb-2">
                <span class="font-bold text-red-500"><i class="fas fa-exclamation-circle"></i> 我的易错词</span>
                <button onclick="clearMistakes()" class="text-xs text-gray-400 hover:text-red-500 font-bold"><i class="fas fa-trash"></i> 清空复习</button>
            </div>
            <div id="mistakes-list" class="space-y-3"></div>
        </div>

        <div id="game-overlay" class="fixed inset-0 bg-white z-40 hidden flex-col">
            <div class="bg-blue-500 text-white p-4 font-bold text-center text-lg shadow-md flex justify-between items-center">
                <span><i class="fas fa-bolt text-yellow-300"></i> 挑战进行中</span>
                <span id="game-progress" class="text-sm bg-blue-600 px-2 rounded-lg"></span>
            </div>
            <div class="flex-grow flex flex-col justify-center p-6 w-full max-w-md mx-auto">
                <div class="text-center mb-8">
                    <button id="btn-play-audio" class="hidden text-6xl text-blue-500 mb-6 hover:scale-110 transition drop-shadow-md"><i class="fas fa-volume-up"></i></button>
                    <h2 id="q-text" class="text-3xl font-extrabold text-gray-800 leading-tight">Question</h2>
                </div>
                
                <div id="mcq-area" class="grid grid-cols-1 gap-4 hidden"></div>
                
                <div id="dict-area" class="hidden flex flex-col gap-6">
                    <input type="text" id="dict-input" class="w-full border-b-4 border-gray-300 bg-gray-50 text-center text-3xl font-extrabold p-4 focus:outline-none focus:border-blue-500 text-blue-600 tracking-wide" placeholder="Type here...">
                    <button onclick="checkDict()" class="duo-btn btn-blue py-4 rounded-xl text-xl mt-4">提交</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let peer = null;
        let conn = null;
        let myName = "";
        let localWords = JSON.parse(localStorage.getItem('vocabLocalWords')) || [];
        let mistakes = JSON.parse(localStorage.getItem('vocabMistakes')) || [];
        
        let currentGame = [], gIdx = 0, gScore = 0, gType = '';

        window.onload = () => { 
            renderWords(); 
            renderMistakes(); 
            
            // 自动读取链接中的 Class ID (扫码或点击链接引入)
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.has('classId')) {
                document.getElementById('class-id').value = urlParams.get('classId');
            }
        };

        function switchTab(t) {
            ['words', 'mistakes'].forEach(x => {
                document.getElementById(`tab-${x}`).classList.replace('active', 'text-gray-400');
                document.getElementById(`view-${x}`).classList.add('hidden');
            });
            document.getElementById(`tab-${t}`).classList.add('active');
            document.getElementById(`tab-${t}`).classList.remove('text-gray-400');
            document.getElementById(`view-${t}`).classList.remove('hidden');
        }

        function connectClass() {
            if(document.getElementById('entry-pass').value !== 'study with FF') return alert('密码错误');
            myName = document.getElementById('stu-name').value.trim();
            const cid = document.getElementById('class-id').value.trim();
            if(!myName || !cid) return alert('请输入你的名字和班级码');

            document.getElementById('btn-connect').innerText = "连接中...";
            document.getElementById('btn-connect').classList.replace('btn-green', 'btn-gray');
            
            peer = new Peer(`vocab-stu-${Math.floor(Math.random()*10000)}`);
            peer.on('open', () => {
                conn = peer.connect(`vocab-ff-${cid}`);
                conn.on('open', () => {
                    document.getElementById('auth-screen').classList.add('hidden');
                    // 核心修改：连接成功后，立刻向老师发送包含自己名字的报道消息
                    conn.send({ type: 'join', name: myName });
                });
                conn.on('data', data => handleTeacherData(data));
                conn.on('error', err => {
                    alert('连接失败，请检查班级码是否正确或老师是否已开启教室。');
                    document.getElementById('btn-connect').innerText = "重试";
                    document.getElementById('btn-connect').classList.replace('btn-gray', 'btn-green');
                });
            });
        }

        function handleTeacherData(payload) {
            if(payload.type === 'words') {
                localWords = payload.data;
                localStorage.setItem('vocabLocalWords', JSON.stringify(localWords));
                renderWords();
                switchTab('words');
                alert('📥 收到老师发送的新词表！');
            } else if(payload.type.startsWith('game_')) {
                startGame(payload.type, payload.data);
            }
        }

        function renderWords() {
            const list = document.getElementById('words-list');
            if(localWords.length) document.getElementById('empty-state').classList.add('hidden');
            list.innerHTML = localWords.map(w => `
                <div class="bg-white p-4 rounded-xl border-2 border-gray-200 shadow-sm cursor-pointer hover:border-blue-300 transition" onclick="speak('${w.word}')">
                    <div class="flex justify-between items-baseline mb-1">
                        <span class="font-extrabold text-xl text-gray-800">${w.word}</span>
                        <span class="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded font-bold">${w.pos}</span>
                    </div>
                    <div class="font-bold text-blue-500 mb-1">${w.definition_cn}</div>
                    <div class="text-sm text-gray-500 italic bg-gray-50 p-2 rounded-lg mt-2 border-l-2 border-gray-200">"${w.example_sentence}"</div>
                </div>
            `).join('');
        }

        function renderMistakes() {
            document.getElementById('mistakes-list').innerHTML = mistakes.map(w => `
                <div class="bg-red-50 p-4 rounded-xl border-2 border-red-100 flex justify-between items-center cursor-pointer hover:bg-red-100 transition" onclick="speak('${w.word}')">
                    <div>
                        <div class="font-extrabold text-lg text-red-600 mb-1">${w.word}</div>
                        <div class="text-sm font-bold text-gray-600">${w.definition_cn}</div>
                    </div>
                    <button class="text-red-400 text-2xl"><i class="fas fa-volume-up"></i></button>
                </div>
            `).join('');
        }
        function clearMistakes() { if(confirm("确定清空错题本吗？")) { mistakes=[]; localStorage.removeItem('vocabMistakes'); renderMistakes(); } }

        function startGame(type, data) {
            if(!data || data.length === 0) return;
            gType = type;
            currentGame = [...data].sort(()=>0.5-Math.random());
            gIdx = 0; gScore = 0;
            document.getElementById('game-overlay').classList.remove('hidden');
            document.getElementById('game-overlay').classList.add('flex');
            loadQuestion();
        }

        function loadQuestion() {
            const q = currentGame[gIdx];
            document.getElementById('game-progress').innerText = `${gIdx + 1} / ${currentGame.length}`;
            document.getElementById('mcq-area').classList.add('hidden');
            document.getElementById('dict-area').classList.add('hidden');
            document.getElementById('btn-play-audio').classList.add('hidden');

            if(gType === 'game_mcq') {
                document.getElementById('q-text').innerText = q.definition_cn;
                document.getElementById('mcq-area').classList.remove('hidden');
                let opts = [q];
                while(opts.length < Math.min(4, localWords.length)) {
                    let rand = localWords[Math.floor(Math.random()*localWords.length)];
                    if(!opts.includes(rand)) opts.push(rand);
                }
                document.getElementById('mcq-area').innerHTML = opts.sort(()=>0.5-Math.random()).map(o => `
                    <button onclick="checkMCQ('${o.word}', '${q.word}')" class="duo-btn btn-blue py-5 rounded-2xl text-xl w-full border-blue-600 shadow-md">${o.word}</button>
                `).join('');
            } else if (gType === 'game_dict') {
                document.getElementById('q-text').innerText = "听音拼写单词";
                document.getElementById('dict-area').classList.remove('hidden');
                document.getElementById('btn-play-audio').classList.remove('hidden');
                document.getElementById('dict-input').value = "";
                document.getElementById('btn-play-audio').onclick = () => speak(q.word);
                speak(q.word);
                setTimeout(() => document.getElementById('dict-input').focus(), 100);
            }
        }

        function checkMCQ(ans, correct) { handleAnswer(ans === correct, correct); }
        function checkDict() { 
            const input = document.getElementById('dict-input').value.trim().toLowerCase();
            const correct = currentGame[gIdx].word.toLowerCase();
            handleAnswer(input === correct, currentGame[gIdx].word); 
        }

        function handleAnswer(isCorrect, wordStr) {
            if(isCorrect) {
                gScore += 100;
            } else {
                let wObj = localWords.find(w => w.word === wordStr);
                if(wObj && !mistakes.find(m => m.word === wordStr)) { 
                    mistakes.push(wObj); 
                    localStorage.setItem('vocabMistakes', JSON.stringify(mistakes)); 
                    renderMistakes(); 
                }
            }
            gIdx++;
            if(gIdx < currentGame.length) loadQuestion();
            else finishGame();
        }

        function finishGame() {
            const acc = Math.round((gScore / (currentGame.length*100))*100) + "%";
            alert(`🎉 挑战完成！\n得分: ${gScore}\n正确率: ${acc}\n(错题已自动收录到错题本)`);
            document.getElementById('game-overlay').classList.add('hidden');
            document.getElementById('game-overlay').classList.remove('flex');
            if(conn) conn.send({ type: 'score', name: myName, score: gScore, acc: acc, gameType: gType === 'game_mcq' ? 'Choice' : 'Dictation' });
        }

        function speak(text) {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US';
            u.rate = 0.9; // 稍微放慢一点语速，适合学生听写
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
