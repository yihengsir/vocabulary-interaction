<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VocabMaster - 学生端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f8fafc; color: #4b5563; padding-bottom: env(safe-area-inset-bottom); }
        
        /* 智能判断顶部安全区距离（刘海/灵动岛） */
        nav { padding-top: max(env(safe-area-inset-top), 12px) !important; }
        
        .duo-btn { border-bottom-width: 4px; transition: all 0.1s; font-weight: 800; cursor: pointer; }
        .duo-btn:active { border-bottom-width: 0px; transform: translateY(4px); }
        .btn-green { background-color: #58cc02; border-color: #46a302; color: white; }
        .btn-blue { background-color: #1cb0f6; border-color: #1899d6; color: white; }
        .btn-gray { background-color: #e5e7eb; border-color: #d1d5db; color: #4b5563; }
        .nav-item.active { color: #58cc02; background-color: #e5f9d6; border: 2px solid #b3eb87; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* 隐藏 details 标签自带的黑三角箭头 */
        summary { list-style: none; }
        summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="auth-screen" class="fixed inset-0 bg-green-500 z-50 flex flex-col items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center shadow-xl">
            <div class="text-green-500 text-5xl mb-4"><i class="fas fa-user-graduate"></i></div>
            <h2 class="text-2xl font-extrabold mb-6 text-gray-800">进入课堂</h2>
            <input type="password" id="entry-pass" class="w-full bg-gray-100 border-2 border-transparent focus:border-green-300 p-3 rounded-xl mb-3 text-center outline-none" placeholder="访问密码">
            <input type="text" id="stu-name" class="w-full bg-gray-100 border-2 border-transparent focus:border-green-300 p-3 rounded-xl mb-3 text-center font-bold outline-none" placeholder="你的名字 (如: Hao Chen)">
            <input type="text" id="class-id" class="w-full bg-gray-100 border-2 border-transparent focus:border-green-300 p-3 rounded-xl mb-6 text-center font-bold outline-none" placeholder="班级连接码 (老师提供)">
            
            <div class="flex gap-3">
                <button onclick="connectClass()" class="duo-btn btn-green flex-1 py-3 rounded-xl text-lg" id="btn-connect">进入教室</button>
                <button onclick="offlineMode()" class="duo-btn btn-gray flex-1 py-3 rounded-xl text-lg" title="查看本地保存的词表和错题">离线复习</button>
            </div>
        </div>
    </div>

    <nav class="bg-white border-b-2 border-gray-200 px-3 sm:px-4 py-3 z-10 flex justify-between items-center shrink-0">
        <div class="font-extrabold text-lg sm:text-xl flex items-center gap-1 text-gray-700 whitespace-nowrap">
            My Words 
            <button onclick="location.reload()" class="text-gray-400 hover:text-blue-500 bg-gray-50 rounded-full w-8 h-8 flex items-center justify-center border border-gray-200"><i class="fas fa-sync-alt text-sm"></i></button>
        </div>
        <div class="flex gap-1">
            <button onclick="switchTab('words')" id="tab-words" class="nav-item active px-2 sm:px-3 py-1.5 rounded-lg font-bold text-sm whitespace-nowrap"><i class="fas fa-book mr-1"></i>词表</button>
            <button onclick="switchTab('mistakes')" id="tab-mistakes" class="nav-item text-gray-400 px-2 sm:px-3 py-1.5 rounded-lg font-bold text-sm whitespace-nowrap"><i class="fas fa-book-dead mr-1"></i>错题</button>
            <button onclick="switchTab('history')" id="tab-history" class="nav-item text-gray-400 px-2 sm:px-3 py-1.5 rounded-lg font-bold text-sm whitespace-nowrap"><i class="fas fa-history mr-1"></i>历史</button>
        </div>
    </nav>

    <main class="flex-grow overflow-auto p-4 w-full max-w-md mx-auto relative pb-8">
        <div id="view-words" class="space-y-3">
            <div class="flex justify-between items-center mb-2">
                <span class="font-bold text-blue-500"><i class="fas fa-book-open"></i> 当前学习词表</span>
                <button onclick="clearWords()" class="text-xs text-gray-400 hover:text-red-500 font-bold"><i class="fas fa-trash"></i> 清空词表</button>
            </div>

            <div class="text-center text-gray-400 font-bold text-sm py-10" id="empty-state">
                <i class="fas fa-satellite-dish text-4xl mb-3 text-gray-300"></i><br>
                等待老师发送最新单词...
            </div>
            <div id="words-list" class="space-y-3"></div>
        </div>

        <div id="view-mistakes" class="hidden space-y-3">
            <div class="flex justify-between items-center mb-2">
                <span class="font-bold text-red-500"><i class="fas fa-exclamation-circle"></i> 我的易错词</span>
                <button onclick="clearMistakes()" class="text-xs text-gray-400 hover:text-red-500 font-bold"><i class="fas fa-trash"></i> 清空</button>
            </div>
            <div id="mistakes-list" class="space-y-3"></div>
        </div>

        <div id="view-history" class="hidden space-y-3">
            <div class="flex justify-between items-center mb-2">
                <span class="font-bold text-gray-600"><i class="fas fa-archive"></i> 过往词表存档</span>
            </div>
            <div id="history-list" class="space-y-3"></div>
        </div>

        <div id="game-overlay" class="fixed inset-0 bg-white z-40 hidden flex-col">
            <div class="bg-blue-500 text-white p-4 font-bold text-center text-lg shadow-md flex justify-between items-center" style="padding-top: max(env(safe-area-inset-top), 16px);">
                <span><i class="fas fa-bolt text-yellow-300"></i> 挑战进行中</span>
                <span id="game-progress" class="text-sm bg-blue-600 px-2 rounded-lg"></span>
            </div>
            <div class="flex-grow flex flex-col justify-center p-6 w-full max-w-md mx-auto">
                <div class="text-center mb-8">
                    <button id="btn-play-audio" class="hidden text-6xl text-blue-500 mb-6 hover:scale-110 transition drop-shadow-md"><i class="fas fa-volume-up"></i></button>
                    <h2 id="q-text" class="text-3xl font-extrabold text-gray-800 leading-tight">Question</h2>
                </div>
                
                <div id="mcq-area" class="grid grid-cols-1 gap-4 hidden"></div>
                
                <div id="dict-area" class="hidden flex flex-col gap-6">
                    <input type="text" id="dict-input" class="w-full border-b-4 border-gray-300 bg-gray-50 text-center text-3xl font-extrabold p-4 focus:outline-none focus:border-blue-500 text-blue-600 tracking-wide" placeholder="Type here...">
                    <button onclick="checkDict()" class="duo-btn btn-blue py-4 rounded-xl text-xl mt-4">提交</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let peer = null;
        let conn = null;
        let myName = "";
        
        let localWords = JSON.parse(localStorage.getItem('vocabLocalWords')) || [];
        let mistakes = JSON.parse(localStorage.getItem('vocabMistakes')) || [];
        let studentHistory = JSON.parse(localStorage.getItem('vocabStudentHistory')) || [];
        
        let currentGame = [], gIdx = 0, gScore = 0, gType = '';

        window.onload = () => { 
            renderWords(); 
            renderMistakes(); 
            renderHistory();
            
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.has('classId')) {
                document.getElementById('class-id').value = urlParams.get('classId');
            }
        };

        function offlineMode() {
            if(document.getElementById('entry-pass').value !== 'study with FF') return alert('密码错误');
            if(localWords.length === 0 && mistakes.length === 0 && studentHistory.length === 0) return alert('本地暂无历史数据，请先连接教室获取数据！');
            
            document.getElementById('auth-screen').classList.add('hidden');
            if(localWords.length === 0 && mistakes.length > 0) {
                switchTab('mistakes');
            } else if(localWords.length === 0 && studentHistory.length > 0) {
                switchTab('history');
            }
        }

        function switchTab(t) {
            ['words', 'mistakes', 'history'].forEach(x => {
                document.getElementById(`tab-${x}`).classList.remove('active');
                document.getElementById(`tab-${x}`).classList.add('text-gray-400');
                document.getElementById(`view-${x}`).classList.add('hidden');
            });
            document.getElementById(`tab-${t}`).classList.add('active');
            document.getElementById(`tab-${t}`).classList.remove('text-gray-400');
            document.getElementById(`view-${t}`).classList.remove('hidden');
        }

        function connectClass() {
            if(document.getElementById('entry-pass').value !== 'study with FF') return alert('密码错误');
            myName = document.getElementById('stu-name').value.trim();
            const cid = document.getElementById('class-id').value.trim();
            if(!myName || !cid) return alert('请输入你的名字和班级码');

            document.getElementById('btn-connect').innerText = "连接中...";
            document.getElementById('btn-connect').classList.replace('btn-green', 'btn-gray');
            
            peer = new Peer(`vocab-stu-${Math.floor(Math.random()*10000)}`);
            peer.on('open', () => {
                conn = peer.connect(`vocab-ff-${cid}`);
                conn.on('open', () => {
                    document.getElementById('auth-screen').classList.add('hidden');
                    conn.send({ type: 'join', name: myName });
                });
                conn.on('data', data => handleTeacherData(data));
                conn.on('error', err => {
                    alert('连接失败，请检查班级码是否正确或老师是否已开启教室。');
                    document.getElementById('btn-connect').innerText = "进入教室";
                    document.getElementById('btn-connect').classList.replace('btn-gray', 'btn-green');
                });
            });
        }

        function handleTeacherData(payload) {
            if(payload.type === 'words') {
                localWords = payload.data;
                localStorage.setItem('vocabLocalWords', JSON.stringify(localWords));
                
                studentHistory.unshift({
                    id: Date.now(),
                    date: new Date().toLocaleString(),
                    words: JSON.parse(JSON.stringify(payload.data))
                });
                localStorage.setItem('vocabStudentHistory', JSON.stringify(studentHistory));

                renderWords();
                renderHistory();
                switchTab('words');
                alert('📥 收到老师发送的新词表！\n(此词表已自动存入“历史”标签页中)');
            } else if(payload.type.startsWith('game_')) {
                startGame(payload.type, payload.data);
            }
        }

        // 修改：增加独立删除按钮，并将点击发声移至文本区域
        function renderWords() {
            const list = document.getElementById('words-list');
            if(localWords.length) document.getElementById('empty-state').classList.add('hidden');
            else document.getElementById('empty-state').classList.remove('hidden');

            list.innerHTML = localWords.map((w, index) => `
                <div class="bg-white p-4 rounded-xl border-2 border-gray-200 shadow-sm relative group hover:border-blue-300 transition">
                    <button onclick="deleteWord(${index}, event)" class="absolute top-3 right-3 text-gray-300 hover:text-red-500 w-8 h-8 flex items-center justify-center rounded-full bg-gray-50 hover:bg-red-50 transition z-10"><i class="fas fa-times"></i></button>
                    
                    <div class="pr-8 cursor-pointer" onclick="speak('${w.word.replace(/'/g, "\\'")}')">
                        <div class="flex items-baseline mb-1">
                            <span class="font-extrabold text-xl text-gray-800 mr-2">${w.word}</span>
                            <span class="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded font-bold">${w.pos}</span>
                        </div>
                        <div class="font-bold text-blue-500 mb-1">${w.definition_cn}</div>
                        <div class="text-sm text-gray-500 italic bg-gray-50 p-2 rounded-lg mt-2 border-l-2 border-gray-200">"${w.example_sentence}"</div>
                    </div>
                </div>
            `).join('');
        }

        // 新增：删除单个单词
        function deleteWord(idx, e) {
            e.stopPropagation(); // 阻止触发下方区域的语音朗读
            if(confirm("确定从当前词表中移除这个单词吗？")) {
                localWords.splice(idx, 1);
                localStorage.setItem('vocabLocalWords', JSON.stringify(localWords));
                renderWords();
            }
        }

        // 新增：清空当前所有单词
        function clearWords() {
            if(localWords.length === 0) return;
            if(confirm("确定清空当前生词表吗？(历史记录中仍会保留)")) {
                localWords = [];
                localStorage.setItem('vocabLocalWords', JSON.stringify(localWords));
                renderWords();
            }
        }

        function renderMistakes() {
            document.getElementById('mistakes-list').innerHTML = mistakes.map(w => `
                <div class="bg-red-50 p-4 rounded-xl border-2 border-red-100 flex justify-between items-center cursor-pointer hover:bg-red-100 transition" onclick="speak('${w.word.replace(/'/g, "\\'")}')">
                    <div>
                        <div class="font-extrabold text-lg text-red-600 mb-1">${w.word}</div>
                        <div class="text-sm font-bold text-gray-600">${w.definition_cn}</div>
                    </div>
                    <button class="text-red-400 text-2xl"><i class="fas fa-volume-up"></i></button>
                </div>
            `).join('');
        }
        function clearMistakes() { if(confirm("确定清空错题本吗？")) { mistakes=[]; localStorage.removeItem('vocabMistakes'); renderMistakes(); } }

        function renderHistory() {
            const list = document.getElementById('history-list');
            if(!studentHistory.length) {
                list.innerHTML = '<div class="text-center text-gray-400 font-bold text-sm py-10"><i class="fas fa-box-open text-4xl mb-3 text-gray-300"></i><br>暂无历史词表</div>';
                return;
            }
            
            list.innerHTML = studentHistory.map(h => `
                <details class="bg-white p-4 rounded-xl border-2 border-gray-200 shadow-sm group mb-3 outline-none cursor-pointer">
                    <summary class="flex justify-between items-center list-none font-bold text-gray-700 outline-none">
                        <span><i class="fas fa-clock text-blue-400 mr-2"></i>${h.date}</span>
                        <div class="flex items-center gap-2">
                            <span class="text-xs bg-gray-100 text-gray-500 px-2 py-1 rounded-full">${h.words.length} 词</span>
                            <i class="fas fa-chevron-down text-gray-400 group-open:rotate-180 transition"></i>
                        </div>
                    </summary>
                    <div class="space-y-2 mt-4 border-t-2 border-gray-100 pt-4">
                        ${h.words.map(w => `
                            <div class="flex justify-between items-center text-sm hover:bg-gray-50 p-1 rounded transition" onclick="speak('${w.word.replace(/'/g, "\\'")}')">
                                <span class="font-extrabold text-gray-800">${w.word}</span> 
                                <span class="text-gray-500 truncate w-1/2 text-right">${w.definition_cn}</span>
                            </div>
                        `).join('')}
                    </div>
                </details>
            `).join('');
        }

        function startGame(type, data) {
            if(!data || data.length === 0) return;
            gType = type;
            currentGame = [...data].sort(()=>0.5-Math.random());
            gIdx = 0; gScore = 0;
            document.getElementById('game-overlay').classList.remove('hidden');
            document.getElementById('game-overlay').classList.add('flex');
            loadQuestion();
        }

        function loadQuestion() {
            const q = currentGame[gIdx];
            document.getElementById('game-progress').innerText = `${gIdx + 1} / ${currentGame.length}`;
            document.getElementById('mcq-area').classList.add('hidden');
            document.getElementById('dict-area').classList.add('hidden');
            document.getElementById('btn-play-audio').classList.add('hidden');

            if(gType === 'game_mcq') {
                document.getElementById('q-text').innerText = q.definition_cn;
                document.getElementById('mcq-area').classList.remove('hidden');
                let opts = [q];
                while(opts.length < Math.min(4, localWords.length)) {
                    let rand = localWords[Math.floor(Math.random()*localWords.length)];
                    if(!opts.includes(rand)) opts.push(rand);
                }
                document.getElementById('mcq-area').innerHTML = opts.sort(()=>0.5-Math.random()).map(o => `
                    <button onclick="checkMCQ('${o.word.replace(/'/g, "\\'")}', '${q.word.replace(/'/g, "\\'")}')" class="duo-btn btn-blue py-5 rounded-2xl text-xl w-full border-blue-600 shadow-md">${o.word}</button>
                `).join('');
            } else if (gType === 'game_dict') {
                document.getElementById('q-text').innerText = "听音拼写单词";
                document.getElementById('dict-area').classList.remove('hidden');
                document.getElementById('btn-play-audio').classList.remove('hidden');
                document.getElementById('dict-input').value = "";
                document.getElementById('btn-play-audio').onclick = () => speak(q.word);
                speak(q.word);
                setTimeout(() => document.getElementById('dict-input').focus(), 100);
            }
        }

        function checkMCQ(ans, correct) { handleAnswer(ans === correct, correct); }
        function checkDict() { 
            const input = document.getElementById('dict-input').value.trim().toLowerCase();
            const correct = currentGame[gIdx].word.toLowerCase();
            handleAnswer(input === correct, currentGame[gIdx].word); 
        }

        function handleAnswer(isCorrect, wordStr) {
            if(isCorrect) {
                gScore += 100;
            } else {
                let wObj = localWords.find(w => w.word === wordStr);
                if(wObj && !mistakes.find(m => m.word === wordStr)) { 
                    mistakes.push(wObj); 
                    localStorage.setItem('vocabMistakes', JSON.stringify(mistakes)); 
                    renderMistakes(); 
                }
            }
            gIdx++;
            if(gIdx < currentGame.length) loadQuestion();
            else finishGame();
        }

        function finishGame() {
            const acc = Math.round((gScore / (currentGame.length*100))*100) + "%";
            alert(`🎉 挑战完成！\n得分: ${gScore}\n正确率: ${acc}\n(错题已自动收录到错题本)`);
            document.getElementById('game-overlay').classList.add('hidden');
            document.getElementById('game-overlay').classList.remove('flex');
            if(conn) conn.send({ type: 'score', name: myName, score: gScore, acc: acc, gameType: gType === 'game_mcq' ? 'Choice' : 'Dictation' });
        }

        function speak(text) {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US';
            u.rate = 0.9; 
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
